# LTX-Video-VAE-3D (Hacohen 2025) — VAE-only evaluation, 64x tier.
in_channels: 4
patch_size: 32
patches_per_load: 8
frames_per_batch: 16
num_workers: 8

model:
  ch: 96
  num_res_blocks: 2
  z_channels: 4
  # Decoder noise schedule sigma ~ U[0, noise_sigma] during training;
  # disabled at inference (sample_posterior=False).
  noise_sigma: 0.2

beta_KL: 0.0
lambda_grad: 0.0
uses_disc: false
gen_lr: 1.0e-4
weight_decay: 1.0e-5
betas: [0.9, 0.999]
mixed_precision: bfloat16
epochs: 60
warmup_epochs: 5
patience: 12
grad_clip: 1.0
