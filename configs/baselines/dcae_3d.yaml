# DC-AE-3D (Chen 2025) — 64x tier on 32^3 patches.
in_channels: 4
patch_size: 32
patches_per_load: 8
frames_per_batch: 16
num_workers: 8

model:
  width: "64,128,256"
  depth: "2,2,2"
  latent_channels: 4

beta_KL: 0.0
lambda_grad: 0.0
uses_disc: false
gen_lr: 1.0e-4
weight_decay: 1.0e-5
betas: [0.9, 0.999]
mixed_precision: bfloat16
epochs: 60
warmup_epochs: 5
patience: 12
grad_clip: 1.0
