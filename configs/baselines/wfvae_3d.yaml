# WF-VAE-3D (Li 2025) — 64x tier on 32^3 patches with synthesized LLL flow.
in_channels: 4
patch_size: 32
patches_per_load: 8
frames_per_batch: 16
num_workers: 8

model:
  ch: 128
  num_res_blocks: 2
  z_channels: 4
  embed_dim: 4

beta_KL: 1.0e-6
lambda_grad: 0.0
uses_disc: false
gen_lr: 1.0e-4
weight_decay: 1.0e-5
betas: [0.9, 0.999]
mixed_precision: bfloat16
epochs: 60
warmup_epochs: 5
patience: 12
grad_clip: 1.0
