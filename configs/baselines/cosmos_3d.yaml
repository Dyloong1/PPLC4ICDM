# Cosmos-CV-3D (NVIDIA 2025) — pure AE (no KL), 64x tier.
in_channels: 4
patch_size: 32
patches_per_load: 8
frames_per_batch: 16
num_workers: 8

model:
  ch: 96
  num_res_blocks: 2
  z_channels: 4

beta_KL: 0.0
lambda_grad: 0.0
uses_disc: false
gen_lr: 1.0e-4
weight_decay: 1.0e-5
# Paper-specific: Cosmos recommends beta_2 = 0.99 (vs the typical 0.999).
betas: [0.9, 0.99]
mixed_precision: bfloat16
epochs: 60
warmup_epochs: 5
patience: 12
grad_clip: 1.0
