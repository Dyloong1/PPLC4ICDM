# Ablation cell: spatial-8 latent + consistency loss, naive reassembly.
arch: spatial8
latent_channels: 4
patch_size: 32

beta_KL: 0.01
lambda_grad: 0.5
lambda_adv: 0.01
lambda_consist: 0.1
consist_shift: 8

optimizer: adamw
gen_lr: 1.0e-4
disc_lr: 5.0e-5
weight_decay: 0.0
betas: [0.9, 0.999]
mixed_precision: bfloat16
epochs: 80
warmup_epochs: 10
patience: 15

train_resolution: 256
patches_per_load: 8
frames_per_batch: 32

reassemble: naive
